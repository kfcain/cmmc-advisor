name: content-lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Voice and citation lint
        run: python3 evals/runner/lint.py
      - name: Scenario YAML sanity
        run: |
          pip install pyyaml
          python3 - <<'EOF'
          import glob, yaml
          for f in glob.glob("evals/scenarios/*.yaml"):
              d = yaml.safe_load(open(f))
              assert d.get("id") and d.get("prompt"), f
          print("scenarios ok")
          EOF
      - name: Program data sample sanity
        run: |
          pip install jsonschema
          python3 - <<'EOF'
          import json, yaml, jsonschema
          schema = json.load(open("templates/program-data.schema.json"))
          sample = yaml.safe_load(open("templates/program-data.sample.yaml"))
          jsonschema.validate(sample, schema)
          print("sample validates against schema")
          EOF
          python3 scripts/discovery_report.py templates/program-data.sample.yaml
      - name: AO dataset integrity
        run: |
          python3 - <<'EOF'
          import json
          d = json.load(open("references/data/assessment-objectives.json"))
          assert d["requirement_count"] == 110
          assert sum(len(r["assessment_objectives"]) for r in d["requirements"]) == 320
          deductions = sum(r["sprs_value"] for r in d["requirements"])
          assert 110 - deductions == -203, deductions
          print("AO dataset ok")
          EOF
      - name: 800-53 crosswalk integrity
        run: |
          python3 - <<'EOF'
          import json
          cw = json.load(open("references/data/800-53-crosswalk.json"))
          ao = json.load(open("references/data/assessment-objectives.json"))
          assert cw["requirement_count"] == 110
          assert len(cw["requirements"]) == 110
          ao_ids = {r["id"] for r in ao["requirements"]}
          cw_ids = {r["cmmc_id"] for r in cw["requirements"]}
          assert ao_ids == cw_ids
          for row in cw["requirements"]:
              assert row["controls_800_53_rev4"]
              assert len(row["controls_oscal"]) == len(row["controls_800_53_rev4"])
          assert len(cw["control_index"]) >= 120
          print("800-53 crosswalk ok")
          EOF
      - name: FRMR snapshot integrity
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path
          p = Path("references/data/frmr-snapshot.json")
          if not p.exists():
              print("frmr-snapshot.json missing; run scripts/build_frmr_snapshot.py")
              raise SystemExit(1)
          snap = json.load(p.open())
          ksi = snap["ksi_catalog"]
          assert ksi["indicator_count"] >= 40
          assert ksi["theme_count"] >= 8
          assert len(snap["vendors"]) >= 1
          print("FRMR snapshot ok")
          EOF
      - name: Eval routing smoke
        run: python3 scripts/eval_routing_smoke.py
      - name: ControlBot profile export smoke
        run: |
          pip install pyyaml
          python3 scripts/export_controlbot_profile.py templates/program-data.sample.yaml --stdout | head -5
      - name: ControlBot import smoke
        run: |
          pip install pyyaml
          cp templates/program-data.sample.yaml /tmp/program-import-test.yaml
          python3 scripts/import_controlbot_seeds.py \
            templates/controlbot-poam-seeds.sample.json \
            /tmp/program-import-test.yaml --dry-run
          python3 scripts/import_controlbot_seeds.py \
            templates/controlbot-poam-seeds.sample.json \
            /tmp/program-import-test.yaml \
            --evidence templates/controlbot-evidence-facts.sample.json
          python3 scripts/validate_poam.py /tmp/program-import-test.yaml || true
          python3 - <<'EOF'
          import yaml
          p = yaml.safe_load(open("/tmp/program-import-test.yaml"))
          assert p.get("controlbot_import", {}).get("poam_applied", 0) >= 1
          touched = False
          for rid, entry in (p.get("requirements") or {}).items():
              poam = (entry or {}).get("poam") or {}
              if "[controlbot:" in poam.get("description", ""):
                  touched = True
                  break
          assert touched, "expected controlbot poam marker on a requirement"
          print("controlbot import ok")
          EOF
      - name: OSCAL SSP emit smoke
        run: |
          pip install pyyaml
          python3 scripts/generate_oscal_ssp.py templates/program-data.sample.yaml -o /tmp/ssp.oscal.json --embed-program
          python3 - <<'EOF'
          import json
          ssp = json.load(open("/tmp/ssp.oscal.json"))
          assert ssp.get("system-security-plan") or ssp.get("uuid")
          print("oscal emit ok")
          EOF
      - name: Evidence collector manifest integrity
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path
          m = json.load(open("references/data/evidence-collector-manifest.json"))
          cols = m["collectors"]
          assert len(cols) == 18, len(cols)
          ids = {c["id"] for c in cols}
          assert len(ids) == len(cols)
          assert m.get("meridian_bridge", {}).get("import_script") == "scripts/import_meridian_run.py"
          for c in cols:
              assert c.get("mappings")
              assert c.get("evidence_bucket"), c["id"]
              assert c.get("env_profile"), c["id"]
              mod = Path(c["module"])
              assert mod.is_file(), c["module"]
          for s in ("import_meridian_run.py", "validate_evidence.py", "export_evidence_package.py", "meridian_lib.py"):
              assert (Path("scripts") / s).is_file(), s
          print("evidence collector manifest ok")
          EOF
