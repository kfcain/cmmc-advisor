name: content-lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Voice and citation lint
        run: python3 evals/runner/lint.py
      - name: Scenario YAML sanity
        run: |
          pip install pyyaml
          python3 - <<'EOF'
          import glob, yaml
          for f in glob.glob("evals/scenarios/*.yaml"):
              d = yaml.safe_load(open(f))
              assert d.get("id") and d.get("prompt"), f
          print("scenarios ok")
          EOF
      - name: AO dataset integrity
        run: |
          python3 - <<'EOF'
          import json
          d = json.load(open("references/data/assessment-objectives.json"))
          assert d["requirement_count"] == 110
          assert sum(len(r["assessment_objectives"]) for r in d["requirements"]) == 320
          deductions = sum(r["sprs_value"] for r in d["requirements"])
          assert 110 - deductions == -203, deductions
          print("AO dataset ok")
          EOF
      - name: 800-53 crosswalk integrity
        run: |
          python3 - <<'EOF'
          import json
          cw = json.load(open("references/data/800-53-crosswalk.json"))
          ao = json.load(open("references/data/assessment-objectives.json"))
          assert cw["requirement_count"] == 110
          assert len(cw["requirements"]) == 110
          ao_ids = {r["id"] for r in ao["requirements"]}
          cw_ids = {r["cmmc_id"] for r in cw["requirements"]}
          assert ao_ids == cw_ids
          for row in cw["requirements"]:
              assert row["controls_800_53_rev4"]
              assert len(row["controls_oscal"]) == len(row["controls_800_53_rev4"])
          assert len(cw["control_index"]) >= 120
          print("800-53 crosswalk ok")
          EOF
      - name: FRMR snapshot integrity
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path
          p = Path("references/data/frmr-snapshot.json")
          if not p.exists():
              print("frmr-snapshot.json missing; run scripts/build_frmr_snapshot.py")
              raise SystemExit(1)
          snap = json.load(p.open())
          ksi = snap["ksi_catalog"]
          assert ksi["indicator_count"] >= 40
          assert ksi["theme_count"] >= 8
          assert len(snap["vendors"]) >= 1
          print("FRMR snapshot ok")
          EOF
      - name: Evidence collector manifest integrity
        run: |
          python3 - <<'EOF'
          import json
          m = json.load(open("references/data/evidence-collector-manifest.json"))
          cols = m["collectors"]
          assert len(cols) >= 10
          ids = {c["id"] for c in cols}
          assert "entra-signins" in ids and "defender-endpoint" in ids
          for c in cols:
              assert c.get("mappings")
          print("evidence collector manifest ok")
          EOF
