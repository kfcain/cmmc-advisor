  qa_log:
  - id: QA-0001
    date: '2026-06-24'
    phase: contracts-cui
    question: Which contract clauses obligate CUI safeguarding, and what CUI types
      flow under them?
    answer: 'Both active contracts carry 252.204-7012 and 252.204-7021. CUI is CTI
      plus export-controlled drawings received through GCC High email.

      '
    answered_by: Contracts manager
    confidence: verified
    affects:
    - M365 GCC High tenant (Exchange, SharePoint, Teams)
  - id: QA-0002
    date: '2026-07-02'
    phase: physical-media
    question: Can the Floor-2 MFP scan to email, and if so, to which mail system?
    answer: 'Scan-to-email is enabled. The relay target was not known in the session;
      IT believes it points at the commercial smart host used before the GCC High
      migration.

      '
    answered_by: IT lead
    confidence: reported
    affects:
    - HP MFP Floor-2
  - id: QA-0003
    date: '2026-07-03'
    phase: dev-ai
    question: From an ENG CUI laptop, what technically stops a request to chatgpt.com?
    answer: 'Defender for Cloud Apps blocks the generative-AI category on managed
      devices; rule export produced. Off-network behavior not yet tested.

      '
    answered_by: Security engineer
    confidence: verified
    affects:
    - ENG laptops (12, Intune-managed, BitLocker)
  - id: QA-0004
    date: '2026-07-03'
    phase: audit-siem
    question: Whose tenant is the SIEM, and which analysts can reach it?
    answer: 'Microsoft Sentinel in the OSC''s own Azure Government subscription; two
      named internal engineers have Log Analytics access. The MSP NOC sees NinjaOne
      alerts in the MSP''s multi-tenant console, which is a second alert path outside
      the documented log-source inventory.

      '
    answered_by: Security engineer
    confidence: verified
    affects:
    - Microsoft Sentinel (Azure Government)
    - NinjaOne for Government (ENG CUI laptops only)
  assumptions:
  - id: AS-0001
    date: '2026-07-02'
    statement: No CUI is scanned at the Floor-2 MFP because signage and policy prohibit
      it.
    basis: Policy statement only; no technical control on the scan path was described.
    risk_if_wrong: 'An assessor treats policy-only separation as no separation; a
      CUI scan through a commercial relay recategorizes the MFP as a CUI asset and
      pulls its network segment into scope.

      '
    status: open
  open_questions:
  - id: OQ-0002
    raised: '2026-07-03'
    phase: audit-siem
    question: Does the MSP NOC's NinjaOne alert console constitute a second, undocumented
      monitoring path holding Security Protection Data?
    why_it_matters: 'An alert path outside the log-source inventory is an unaudited
      SPD flow into a multi-tenant provider console; an assessor follows it to the
      MSP''s environment and the CRM.

      '
    owner: Security engineer
    status: open
  - id: OQ-0001
    raised: '2026-07-02'
    phase: physical-media
    question: What SMTP relay does the Floor-2 MFP scan-to-email path use, and does
      it transit a commercial mail system?
    why_it_matters: 'A commercial relay in a CUI scan path is an unassessed CSP in
      the data flow; the assessor follows the flow, not the policy.

      '
    owner: IT lead
    status: open
  decisions:
  - id: DE-0001
    date: '2026-06-24'
    decision: Keep the IGEL thin clients out of scope on the KVM-only VDI pattern.
    rationale: 'Clipboard, drive mapping, printing, and local storage are blocked
      and validated per the vdi-thin-client-igel baseline checklist; revisit if any
      redirection setting changes.

      '
    decided_by: ISSM
