  system_name: APM GCC High CUI Enclave
  cage_codes:
  - 8XYZ9
  revision: Rev 2
  date: '2026-07-05'
  scope_narrative: Atlas Precision Manufacturing (APM) machines vehicle components
    for an Army prime. CUI (CTI and export-controlled drawings) is processed only
    in a Microsoft 365 GCC High tenant, twelve Intune-managed Windows laptops, Azure
    Government file services, and Microsoft Sentinel. Commercial M365, corporate HR/finance,
    and IGEL thin-client VDI terminals are out of scope with documented separation.
    Paper CUI (marked CTI hardcopy, traveler drawings, mail pouches) is in scope for
    the CUI floor mail room, locked job boxes, and cross-cut destruction path; digital
    CUI remains in GCC High.
  roles:
    system_owner:
      name: Jordan Rivera
      title: Director of Engineering
      email: jrivera@atlasprecision.example
    affirming_official:
      name: Casey Morgan
      title: CEO
      email: cmorgan@atlasprecision.example
      responsibilities:
      - Affirm continuing compliance in SPRS
    issm:
      name: Sam Patel
      title: ISSM / IT Security Lead
      email: spatel@atlasprecision.example
      responsibilities:
      - Maintain SSP, POA&M, and program-data.yaml
      - Run quarterly evidence collection and SPRS updates
    engineer_lead:
      name: Alex Kim
      title: Cloud Engineering Lead
      email: akim@atlasprecision.example
      responsibilities:
      - ControlBot profile and Terraform enclave IaC
  purpose: Demo OSC for CMMC Advisor toolkit walkthrough
  environment_narrative: 'Primary enclave: GCC High (Entra ID USGov, EXO/SPO/Teams),
    Azure Government (Sentinel, project file share). Edge: FortiGate 100F. RMM: NinjaOne
    for Government on CUI laptops only. Engineering uses Azure DevOps Government for
    IaC; ControlBot gates Terraform PRs.'
