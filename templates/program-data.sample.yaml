# Sample CMMC program data file. Validate against program-data.schema.json.
# This is a worked miniature: three requirements shown in three states
# (met with evidence, shared with a platform, not-met with a POA&M).
# A real file carries an entry for every requirement in
# references/data/assessment-objectives.json.

organization:
  name: Example Defense Systems LLC
  system_name: EDS CUI Enclave
  cage_codes: [1ABC2]
  revision: Rev 1
  date: "2026-07-01"
  scope_narrative: >
    The CMMC Assessment Scope is the EDS CUI Enclave: a Microsoft 365 GCC
    High tenant, twelve Intune-managed Windows laptops used by the
    engineering team, and the Azure Government subscription hosting the
    project file service. Corporate IT (commercial M365) is out of scope
    and separated by tenant boundary with no CUI authorized.
  roles:
    system_owner:
      name: Jordan Rivera
      title: Director of Engineering
      email: jrivera@example.com
    affirming_official:
      name: Casey Morgan
      title: Chief Executive Officer
      responsibilities:
        - Affirm continuing compliance in SPRS after each assessment and annually
    issm:
      name: Sam Patel
      title: IT and Security Lead
      responsibilities:
        - Maintain this SSP, the POA&M, and the risk register

responsibility_matrix:
  updated: "2026-07-01"
  notes: Internal RACI; FedRAMP CRM rows live under inheritance_sources for GCC High
  entries:
    - scope: AC
      scope_label: Access Control (family)
      accountable: issm
      responsible: [issm]
      informed: [affirming_official]
      evidence_owner: issm
    - scope: PE
      scope_label: Physical Protection (family)
      accountable: issm
      responsible: [issm, system_owner]
      evidence_owner: issm
      notes: Badge exports via physical-access-pacs collector
    - scope: SC.L2-3.13.11
      scope_label: FIPS-validated cryptography
      accountable: issm
      responsible: [issm]
      evidence_owner: issm
      notes: Windows endpoints + FortiGate FIPS-cc; CMVP table in program data

assessment:
  level: "2"
  path: c3pao
  target_date: "2026-11-01"

conditional_status_date: null

sprs_submission:
  score: 95
  date: "2026-06-01"
  submitted_by: ISSM
  notes: Pre-assessment self-score; dashboard computed score may differ as objectives are updated

trust_center:
  published: true
  last_reviewed: "2026-07-01"
  security_contact: security@example.com
  disclaimer: >
    This trust center summarizes security posture for customers and partners.
    It is not a CMMC certificate, C3PAO assessment result, or FedRAMP authorization.
  attestations:
    - framework: CMMC
      level: "2"
      status: In progress
      status_date: "2026-06-01"
      affirmation_current: false
  public_documents:
    - title: Microsoft GCC High CRM (customer NDA)
      type: vendor-crm
      url: https://learn.microsoft.com/en-us/compliance/us-government/gov-cmmc
      updated: "2026-03-01"

assets:
  cui:
    - name: M365 GCC High tenant (Exchange, SharePoint, Teams)
      vendor: Microsoft
      description: CUI storage, processing, and transmission
    - name: ENG laptops (12, Intune-managed, BitLocker)
      description: CUI processing endpoints
  security_protection:
    - name: Microsoft Sentinel (Azure Government)
      vendor: Microsoft
      description: SIEM ingesting enclave logs
    - name: FortiGate 100F enclave edge
      vendor: Fortinet
      location: Building A MDF
      baseline_profile: network-firewall-onprem
      baseline_validation:
        validated: "2026-06-20"
        fips_cc_mode: true
        cmvp_certificate: "see vendor datasheet for deployed firmware"
    - name: NinjaOne for Government (ENG CUI laptops only)
      vendor: NinjaOne
      description: FedRAMP Moderate RMM; segregated from MSP commercial tenants
      baseline_profile: msp-rmm-platform
      baseline_validation:
        validated: "2026-07-01"
        fedramp_package_id: FR2430847803
        authorization: FedRAMP Moderate Rev5 Class C
        cui_agents: 12
        commercial_tenant_segregated: true
  contractor_risk_managed:
    - name: HP MFP Floor-2
      location: Building A, adjacent to CUI floor
      baseline_profile: printer-mfp
      notes: Scan-to-email path unverified; CRMA claim rests on VLAN ACL plus no-CUI-print policy
      discovery_refs: [QA-0002, OQ-0001]
      baseline_validation:
        validated: "2026-06-15"
        controls: [vlan_acl, admin_mfa, no_cui_print]
  out_of_scope:
    - name: IGEL UD3 thin clients (8)
      vendor: IGEL
      description: VDI terminals; CUI session only in Azure Virtual Desktop
      baseline_profile: vdi-thin-client-igel
      baseline_validation:
        validated: "2026-06-28"
        checklist_id: igel-out-of-scope
        clipboard_blocked: true
        printing_blocked: true
        usb_storage_blocked: true
        no_local_cui_storage: true
  specialized:
    - name: CNC-07 controller
      description: OT device on isolated VLAN, documented in SSP
      baseline_profile: specialized-ot
      baseline_validation:
        validated: "2026-06-10"
        notes: Isolated VLAN; no CUI storage on HMI

diagrams:
  network: diagrams/eds-network-2026-06.pdf
  cui_flow: diagrams/eds-cui-flow-2026-06.pdf

cmvp_certificates:
  - certificate: "4536"
    vendor: Microsoft
    module: Windows Cryptographic Primitives Library
    standard: FIPS 140-3
    status: Active
    sunset: "2030-03-01"
    security_policy: https://csrc.nist.gov/projects/cryptographic-module-validation-program

topology:
  zones:
    - id: enclave
      label: EDS CUI Enclave
      kind: enclave
      boundary: cmmc-scope
    - id: gcch
      label: Microsoft GCC High / Azure Gov
      kind: csp
      boundary: fedramp
    - id: corp
      label: Corporate IT (commercial M365)
      kind: corporate
      boundary: none
    - id: ext
      label: External
      kind: external
      boundary: none
  nodes:
    - id: laptops
      label: ENG laptops (12, Intune)
      zone: enclave
      category: cui
      role: process
    - id: cnc
      label: CNC-07 (isolated VLAN)
      zone: enclave
      category: specialized
      role: process
    - id: m365
      label: GCC High tenant (EXO/SPO/Teams)
      zone: gcch
      category: cui
      role: store
    - id: fileproj
      label: Project file service (Azure Gov)
      zone: gcch
      category: cui
      role: store
    - id: sentinel
      label: Microsoft Sentinel
      zone: gcch
      category: security-protection
      role: process
    - id: corpmail
      label: Corporate M365 (no CUI)
      zone: corp
      category: out-of-scope
      role: process
    - id: prime
      label: Prime contractor
      zone: ext
      category: out-of-scope
      role: entity
  flows:
    - {from: prime, to: m365, data: cui, label: encrypted email/SPO share}
    - {from: laptops, to: m365, data: cui, label: HTTPS 443, bidirectional: true}
    - {from: laptops, to: fileproj, data: cui, label: SMB over P2S VPN}
    - {from: laptops, to: sentinel, data: spd, label: AMA agent logs}
    - {from: m365, to: sentinel, data: spd, label: audit log connector}
    - {from: corpmail, to: laptops, data: other, label: calendar only, bidirectional: true}

policies:
  - id: pol-ac
    title: Access Control and Identity Policy
    version: "3.1"
    owner: Sam Patel
    reviewed: "2026-05-01"
    location: policies/access-control-v3.1.pdf
    procedures:
      - procedures/access-request-procedure-v3.pdf
    requirements: [AC.L2-3.1.1, AC.L2-3.1.2, IA.L2-3.5.1, IA.L2-3.5.2]
  - id: pol-ir
    title: Incident Response Policy
    version: "2.0"
    owner: Sam Patel
    reviewed: "2025-04-15"
    location: policies/incident-response-v2.pdf
    requirements: [IR.L2-3.6.1, IR.L2-3.6.2]

inheritance_sources:
  - id: gcch
    provider: Microsoft
    cso: Microsoft 365 GCC High
    fedramp_status: FedRAMP High (DISA IL5 PA)
    crm_document: Microsoft 365 GCC High CIS/CRM Appendix J, 2026-03 edition
    boe_reference: vendor-boe/microsoft/2026-03/
    verified: "2026-06-15"

discovery:
  updated: "2026-07-02"
  phases:
    contracts-cui:
      status: complete
      last_touched: "2026-06-24"
      summary: >
        Two active DoD contracts with 252.204-7012 and 252.204-7021; CUI
        types are CTI and export-controlled drawings. No DoD SAFE flows.
    physical-media:
      status: in-progress
      last_touched: "2026-07-02"
      summary: >
        Print path mapped; scan-to-email path on the Floor-2 MFP still
        unverified. Paper CUI handling and mail procedures not yet covered.
    dev-ai:
      status: in-progress
      last_touched: "2026-07-03"
      summary: >
        Two engineers use Copilot on a commercial GitHub org; sanctioned-AI
        decision not yet made. SSO catalog sweep found a personal ChatGPT
        Plus subscription expensed in May.
    audit-siem:
      status: in-progress
      last_touched: "2026-07-03"
      summary: >
        Sentinel is OSC-tenant (Azure Government) with documented log
        sources, but the MSP's NOC also receives NinjaOne alerts in their
        own console; that path is not yet in the log-source inventory.
  qa_log:
    - id: QA-0001
      date: "2026-06-24"
      phase: contracts-cui
      question: Which contract clauses obligate CUI safeguarding, and what CUI types flow under them?
      answer: >
        Both active contracts carry 252.204-7012 and 252.204-7021. CUI is
        CTI plus export-controlled drawings received through GCC High email.
      answered_by: Contracts manager
      confidence: verified
      affects: ["M365 GCC High tenant (Exchange, SharePoint, Teams)"]
    - id: QA-0002
      date: "2026-07-02"
      phase: physical-media
      question: Can the Floor-2 MFP scan to email, and if so, to which mail system?
      answer: >
        Scan-to-email is enabled. The relay target was not known in the
        session; IT believes it points at the commercial smart host used
        before the GCC High migration.
      answered_by: IT lead
      confidence: reported
      affects: [HP MFP Floor-2]
    - id: QA-0003
      date: "2026-07-03"
      phase: dev-ai
      question: From an ENG CUI laptop, what technically stops a request to chatgpt.com?
      answer: >
        Defender for Cloud Apps blocks the generative-AI category on
        managed devices; rule export produced. Off-network behavior not
        yet tested.
      answered_by: Security engineer
      confidence: verified
      affects: ["ENG laptops (12, Intune-managed, BitLocker)"]
    - id: QA-0004
      date: "2026-07-03"
      phase: audit-siem
      question: Whose tenant is the SIEM, and which analysts can reach it?
      answer: >
        Microsoft Sentinel in the OSC's own Azure Government subscription;
        two named internal engineers have Log Analytics access. The MSP
        NOC sees NinjaOne alerts in the MSP's multi-tenant console, which
        is a second alert path outside the documented log-source
        inventory.
      answered_by: Security engineer
      confidence: verified
      affects: [Microsoft Sentinel (Azure Government), NinjaOne for Government (ENG CUI laptops only)]
  assumptions:
    - id: AS-0001
      date: "2026-07-02"
      statement: No CUI is scanned at the Floor-2 MFP because signage and policy prohibit it.
      basis: Policy statement only; no technical control on the scan path was described.
      risk_if_wrong: >
        An assessor treats policy-only separation as no separation; a CUI
        scan through a commercial relay recategorizes the MFP as a CUI
        asset and pulls its network segment into scope.
      status: open
  open_questions:
    - id: OQ-0002
      raised: "2026-07-03"
      phase: audit-siem
      question: Does the MSP NOC's NinjaOne alert console constitute a second, undocumented monitoring path holding Security Protection Data?
      why_it_matters: >
        An alert path outside the log-source inventory is an unaudited SPD
        flow into a multi-tenant provider console; an assessor follows it
        to the MSP's environment and the CRM.
      owner: Security engineer
      status: open
    - id: OQ-0001
      raised: "2026-07-02"
      phase: physical-media
      question: What SMTP relay does the Floor-2 MFP scan-to-email path use, and does it transit a commercial mail system?
      why_it_matters: >
        A commercial relay in a CUI scan path is an unassessed CSP in the
        data flow; the assessor follows the flow, not the policy.
      owner: IT lead
      status: open
  decisions:
    - id: DE-0001
      date: "2026-06-24"
      decision: Keep the IGEL thin clients out of scope on the KVM-only VDI pattern.
      rationale: >
        Clipboard, drive mapping, printing, and local storage are blocked
        and validated per the vdi-thin-client-igel baseline checklist;
        revisit if any redirection setting changes.
      decided_by: ISSM

requirements:
  AC.L2-3.1.1:
    conformity: met
    objectives:
      a:
        conformity: met
        statement: >
          Authorized users are identified in Entra ID Government. The
          engineering security group ENG-CUI is the single authorization
          source for enclave access; membership requires a signed access
          request approved by the system owner.
        evidence:
          - name: ENG-CUI group membership export
            link: evidence/ac/3.1.1/group-export-2026-06.csv
            collected: "2026-06-20"
          - name: Access request procedure
            link: evidence/ac/3.1.1/access-request-procedure-v3.pdf
      d:
        conformity: met
        statement: >
          Conditional Access policy CA-01 blocks all access to the tenant
          except from compliant, Intune-enrolled devices by ENG-CUI
          members with phishing-resistant MFA.
        evidence:
          - name: CA-01 policy export
            link: evidence/ac/3.1.1/ca-01-export.json
  SC.L2-3.13.11:
    conformity: met
    objectives:
      a:
        conformity: shared
        statement: >
          FIPS-validated cryptography is employed for CUI at rest and in
          transit. Service-side cryptography is inherited from the GCC
          High boundary per the Microsoft CRM; customer-side, BitLocker
          runs in FIPS mode (CMVP certificate 4536) enforced by Intune
          policy EDS-FIPS-01.
        inheritance:
          source: gcch
          type: shared
          crm_ref: SC-13 rows 3-7
          customer_note: Customer enforces FIPS mode on endpoints and manages Intune policy
        evidence:
          - name: Intune EDS-FIPS-01 policy export
            link: evidence/sc/3.13.11/intune-fips-policy.json
  AU.L2-3.3.5:
    conformity: not-met
    objectives:
      a:
        conformity: not-met
        statement: >
          Audit record review processes are not yet correlated across
          sources. Sentinel collects enclave logs but correlation rules
          and the weekly review runbook are not implemented.
    poam:
      priority: High
      description: Implement Sentinel analytics rules and weekly correlated review for enclave audit records
      opened: "2026-06-22"
      due: "2026-09-15"
      owner: Sam Patel
      status: in-progress
      actions:
        - Deploy Microsoft Sentinel analytics rules for the enclave workspace
        - Stand up weekly audit review runbook with sign-off log
        - Backfill 90 days of review evidence before assessment
    remediation_plan: >
      Sentinel workspace exists and ingests all enclave sources. Remaining
      work is detection content and the operating rhythm. Note: AU.L2-3.3.5
      carries 5 SPRS points and is not POA&M-eligible under 32 CFR
      170.21(a)(2)(ii); close this gap before assessment or accept the
      score deduction.
