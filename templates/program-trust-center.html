<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Security Trust Center</title>
<style>
  :root {
    --surface: #fcfcfb; --plane: #f9f9f7; --ink: #0b0b0b; --ink-2: #52514e;
    --muted: #898781; --grid: #e1e0d9; --good: #0ca30c;
  }
  @media (prefers-color-scheme: dark) { :root {
    --surface: #1a1a19; --plane: #0d0d0d; --ink: #ffffff; --ink-2: #c3c2b7;
    --muted: #898781; --grid: #2c2c2a;
  }}
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--plane); color: var(--ink);
         font: 15px/1.55 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  header { padding: 28px 24px 16px; max-width: 960px; margin: 0 auto; }
  header h1 { font-size: 26px; margin: 0 0 6px; }
  header .sub { color: var(--ink-2); max-width: 720px; }
  header .meta { color: var(--muted); font-size: 13px; margin-top: 10px; }
  main { padding: 0 24px 48px; max-width: 960px; margin: 0 auto; }
  section { background: var(--surface); border: 1px solid var(--grid); border-radius: 10px;
             padding: 18px 20px; margin-bottom: 16px; }
  section h2 { margin: 0 0 12px; font-size: 17px; }
  section p { margin: 0 0 10px; color: var(--ink-2); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 0; border-top: 1px solid var(--grid);
           vertical-align: top; }
  th { color: var(--muted); font-size: 12px; text-transform: uppercase;
       letter-spacing: .04em; border-top: none; }
  a { color: var(--ink); }
  .badge { display: inline-block; border: 1px solid var(--grid); border-radius: 999px;
           padding: 2px 10px; font-size: 12px; color: var(--ink-2); }
  .disclaimer { font-size: 13px; color: var(--muted); margin-top: 24px; }
  footer { color: var(--muted); font-size: 12px; padding: 0 24px 32px; max-width: 960px; margin: 0 auto; }
</style>
</head>
<body>
<header>
  <h1 id="org-name">Security Trust Center</h1>
  <div class="sub" id="tagline"></div>
  <div class="meta" id="header-meta"></div>
</header>
<main id="content"></main>
<footer id="footer"></footer>
<script type="application/json" id="public-data">__PUBLIC_DATA__</script>
<script>
(() => {
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const data = JSON.parse(document.getElementById("public-data").textContent);
  const org = data.organization || {};
  const trust = data.trust_center || {};
  const assessment = data.assessment || {};

  document.title = (org.name ? org.name + " — " : "") + "Security Trust Center";
  document.getElementById("org-name").textContent = org.name || "Security Trust Center";
  document.getElementById("tagline").textContent = org.purpose || org.scope_narrative || "";
  const meta = [];
  if (assessment.level) meta.push("CMMC Level " + assessment.level);
  if (org.revision) meta.push("Revision " + org.revision);
  if (trust.last_reviewed) meta.push("Last reviewed " + trust.last_reviewed);
  if (trust.security_contact) meta.push("Contact " + trust.security_contact);
  document.getElementById("header-meta").textContent = meta.join(" · ");

  const parts = [];

  if (org.scope_narrative) {
    parts.push(`<section><h2>Scope</h2><p>${esc(org.scope_narrative)}</p></section>`);
  }
  if (org.environment_narrative) {
    parts.push(`<section><h2>Environment</h2><p>${esc(org.environment_narrative)}</p></section>`);
  }

  const attest = trust.attestations || [];
  if (attest.length) {
    let rows = attest.map(a => `<tr><td>${esc(a.framework)}</td><td>${esc(a.level || a.status)}</td><td>${esc(a.status_date || a.affirmation_date || "")}</td><td>${a.affirmation_current ? "Current" : ""}</td></tr>`).join("");
    parts.push(`<section><h2>Certifications &amp; Attestations</h2><table><thead><tr><th>Framework</th><th>Level / Status</th><th>Date</th><th>Affirmation</th></tr></thead><tbody>${rows}</tbody></table></section>`);
  } else if (assessment.level) {
    parts.push(`<section><h2>Certifications &amp; Attestations</h2><p><span class="badge">CMMC Level ${esc(assessment.level)} program</span></p></section>`);
  }

  const subs = data.inheritance_sources || [];
  if (subs.length) {
    let rows = subs.map(s => `<tr><td>${esc(s.provider)}</td><td>${esc(s.cso)}</td><td>${esc(s.fedramp_status)}</td><td>${esc(s.verified || "")}</td></tr>`).join("");
    parts.push(`<section><h2>Cloud Providers &amp; Subprocessors</h2><table><thead><tr><th>Provider</th><th>Service</th><th>Authorization</th><th>Verified</th></tr></thead><tbody>${rows}</tbody></table></section>`);
  }

  const policies = data.policies || [];
  if (policies.length) {
    let rows = policies.map(p => `<tr><td>${esc(p.title)}</td><td>${esc(p.version || "")}</td><td>${esc(p.reviewed || "")}</td></tr>`).join("");
    parts.push(`<section><h2>Policy Register</h2><table><thead><tr><th>Policy</th><th>Version</th><th>Last Reviewed</th></tr></thead><tbody>${rows}</tbody></table></section>`);
  }

  const cmvp = data.cmvp_certificates || [];
  if (cmvp.length) {
    let rows = cmvp.map(c => {
      const pol = c.security_policy ? `<a href="${esc(c.security_policy)}" rel="noopener noreferrer" target="_blank">Registry</a>` : "";
      return `<tr><td>${esc(c.certificate)}</td><td>${esc(c.module)}</td><td>${esc(c.standard)}</td><td>${esc(c.status)}</td><td>${pol}</td></tr>`;
    }).join("");
    parts.push(`<section><h2>Cryptography (FIPS Validation)</h2><table><thead><tr><th>Certificate</th><th>Module</th><th>Standard</th><th>Status</th><th>Registry</th></tr></thead><tbody>${rows}</tbody></table></section>`);
  }

  const docs = trust.public_documents || [];
  if (docs.length) {
    let rows = docs.map(d => `<tr><td>${esc(d.title)}</td><td>${esc(d.type || "")}</td><td><a href="${esc(d.url)}" rel="noopener noreferrer" target="_blank">${esc(d.url)}</a></td><td>${esc(d.updated || "")}</td></tr>`).join("");
    parts.push(`<section><h2>Public Documents</h2><table><thead><tr><th>Title</th><th>Type</th><th>Link</th><th>Updated</th></tr></thead><tbody>${rows}</tbody></table></section>`);
  }

  const roles = org.roles || {};
  const roleSlugs = Object.keys(roles);
  if (roleSlugs.length) {
    let rows = roleSlugs.map(slug => {
      const r = roles[slug];
      const resp = (r.responsibilities || []).map(x => esc(x)).join("; ");
      return `<tr><td>${esc(r.title)}</td><td>${resp}</td></tr>`;
    }).join("");
    parts.push(`<section><h2>Security Accountability</h2><table><thead><tr><th>Role</th><th>Responsibilities</th></tr></thead><tbody>${rows}</tbody></table></section>`);
  }

  if (trust.disclaimer) {
    parts.push(`<p class="disclaimer">${esc(trust.disclaimer)}</p>`);
  }

  document.getElementById("content").innerHTML = parts.join("");
  document.getElementById("footer").textContent =
    "Generated trust center · " + (data.meta?.generated_at || "") + " · not a substitute for formal assessment evidence";
})();
</script>
</body>
</html>
