id: dib-fedramp-security-tools
title: ISSM asks which FedRAMP Rev5 Class C/D tools map to CMMC for a typical DIB stack
category: modern-it

prompt: |
  We run GCC High plus SentinelOne, Tenable, Duo, Palo Alto SASE, Varonis,
  Datadog for Government, and KnowBe4 on our CUI enclave. Our ISSM wants to know how
  this skill treats FedRAMP Rev 5 Class C and Class D certified tools common
  in the DIB, and how to map them to CMMC assessment objectives without
  over-claiming inheritance. Where do we look?

required_terms:
  - FedRAMP
  - Class C
  - assessment objectives
  - CRM
  - marketplace

factual_claims_expected: true

expected_recommendation: |
  Route to references/modern-it/security-operations/dib-fedramp-security-tools.md
  for the DIB-common catalog with Marketplace package IDs (SentinelOne High
  FR1919071020A, Tenable Government Solutions FR1814276801, Duo Federal
  FR1823149273, Palo Alto GCS, Varonis, Datadog for Government FR2023864279,
  KnowBe4 Platform FR2201340492, etc.) and CMMC family mapping.

  Pair with references/grc/solution-selection.md for Rev5 Moderate = Class C
  floor and Rev5 High = Class D path rules, and references/data/fedramp-snapshot.json
  (regenerate via build_fedramp_snapshot.py) for machine-readable status.

  Do not treat FedRAMP authorization as automatic CMMC conformity. Map CRM
  Appendix J rows to assessment objectives per references/grc/inherited-controls-mapping.md.
  Collect evidence from underlying platforms (Duo logs, Tenable scans, EDR
  coverage); MSSPs like Cyderes inherit from customer-owned authorized tools,
  not from the MSSP brand alone.

  Verify every package at marketplace.fedramp.gov before SSP citation. ATX
  Defense CMMC Space and Deltek Costpoint were not Authorized at last snapshot;
  flag In Process / FRR statuses honestly.

evaluator_notes: |
  Must cite dib-fedramp-security-tools.md, solution-selection Class C/D framing,
  CRM/inheritance caveats, marketplace verification discipline. Enabler posture:
  concrete mapping workflow, not "buy FedRAMP and you are done."
